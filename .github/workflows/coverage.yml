name: Code Coverage

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Monday 6am UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  COVERAGE_THRESHOLD: 60

jobs:
  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info --json --output-path coverage.json

      - name: Extract coverage and check threshold
        id: coverage
        run: |
          COVERAGE=$(python3 -c "
          import json
          with open('coverage.json') as f:
              data = json.load(f)
          totals = data['data'][0]['totals']['lines']
          print(f'{totals[\"percent\"]:.1f}')
          ")
          echo "percentage=${COVERAGE}" >> "$GITHUB_OUTPUT"

          if (( $(echo "$COVERAGE >= $COVERAGE_THRESHOLD" | bc -l) )); then
            STATUS="Above threshold (${COVERAGE_THRESHOLD}%)"
            PASS=true
          else
            STATUS="Below threshold (${COVERAGE_THRESHOLD}%)"
            PASS=false
          fi

          {
            echo "## Code Coverage"
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Line Coverage | ${COVERAGE}% |"
            echo "| Status | ${STATUS} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$PASS" = "false" ]; then
            echo "::error::Line coverage ${COVERAGE}% is below the required ${COVERAGE_THRESHOLD}% threshold"
            exit 1
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-report
          path: lcov.info
          retention-days: 7
