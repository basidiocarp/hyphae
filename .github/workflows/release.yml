name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            cross: false
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: false

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5.0.4
        if: matrix.target != 'aarch64-apple-darwin'
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Install musl-tools and OpenSSL (Linux musl)
        if: contains(matrix.target, 'musl') && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools pkg-config libssl-dev

      - name: Install cross (aarch64-linux)
        if: matrix.cross
        uses: taiki-e/install-action@v2.69.6
        with:
          tool: cross

      - name: Configure macOS SDK
        if: startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple')
        run: |
          set -euo pipefail
          for app in \
            /Applications/Xcode_16.3.app \
            /Applications/Xcode_16.2.app \
            /Applications/Xcode_16.1.app \
            /Applications/Xcode_15.4.app
          do
            if [ -d "$app/Contents/Developer" ]; then
              sudo xcode-select -s "$app/Contents/Developer"
              break
            fi
          done
          echo "DEVELOPER_DIR=$(xcode-select -p)" >> "$GITHUB_ENV"
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"
          echo "MACOSX_DEPLOYMENT_TARGET=14.0" >> "$GITHUB_ENV"
          xcode-select -p
          xcodebuild -version
          clang --version

      - name: Configure cross for musl (aarch64)
        if: matrix.cross && contains(matrix.target, 'musl')
        run: |
          mkdir -p .cargo
          cat > Cross.toml <<'TOML'
          [target.aarch64-unknown-linux-musl]
          pre-build = ["apt-get update && apt-get install -y pkg-config libssl-dev"]
          [target.aarch64-unknown-linux-musl.env]
          passthrough = ["CFLAGS", "OPENSSL_DIR", "OPENSSL_LIB_DIR", "OPENSSL_INCLUDE_DIR"]
          TOML

      - name: Build and package release variants
        run: |
          set -euo pipefail

          build_variant() {
            local variant="$1"
            local asset_suffix="$2"
            local cargo_feature_flag="$3"
            local binary="target/${{ matrix.target }}/release/hyphae"
            local build_log="build-${{ matrix.target }}-${variant}.log"
            local smoke_log="smoke-${{ matrix.target }}-${variant}.log"

            if [ "${{ matrix.cross }}" = "true" ]; then
              if [ -n "$cargo_feature_flag" ]; then
                CROSS_CONTAINER_OPTS="--env CFLAGS" cross build --release "$cargo_feature_flag" --target ${{ matrix.target }}
              else
                CROSS_CONTAINER_OPTS="--env CFLAGS" cross build --release --target ${{ matrix.target }}
              fi
            elif [[ "${{ matrix.target }}" == *apple-darwin ]]; then
              export CARGO_BUILD_JOBS=1
              export CC_ENABLE_DEBUG_OUTPUT=1
              if [ -n "$cargo_feature_flag" ]; then
                cargo build --release "$cargo_feature_flag" --target ${{ matrix.target }} -vv 2>&1 | tee "$build_log"
              else
                cargo build --release --target ${{ matrix.target }} -vv 2>&1 | tee "$build_log"
              fi

              codesign --force --sign - "$binary"
              codesign -dv "$binary" 2>&1

              echo "--- ${variant}: version check ---"
              "$binary" --version
              echo "--- ${variant}: sqlite smoke (stats) ---"
              "$binary" stats
              echo "--- ${variant}: MCP initialize ---"
              printf '%s' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"release-smoke","version":"0.1"}}}' \
                | "$binary" serve 2>&1 | tee "$smoke_log"
              grep -q 'protocolVersion' "$smoke_log"
            else
              if [ -n "$cargo_feature_flag" ]; then
                cargo build --release "$cargo_feature_flag" --target ${{ matrix.target }}
              else
                cargo build --release --target ${{ matrix.target }}
              fi
            fi

            if [ "${{ matrix.archive }}" = "tar.gz" ]; then
              (
                cd "target/${{ matrix.target }}/release"
                tar czf "../../../hyphae-${{ matrix.target }}${asset_suffix}.tar.gz" hyphae
              )
            else
              (
                cd "target/${{ matrix.target }}/release"
                7z a "../../../hyphae-${{ matrix.target }}${asset_suffix}.zip" hyphae.exe
              )
            fi
          }

          # sqlite-vec uses BSD u_int*_t types missing from musl — define them
          if [[ "${{ matrix.target }}" == *-musl ]]; then
            export CFLAGS="-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int64_t=uint64_t"
          fi

          build_variant "slim" "" "--no-default-features"
          # ort-sys ships no pre-built ONNX Runtime for musl targets and
          # fastembed needs ort, so the embeddings variant cannot be built
          # on *-musl. Slim is the shipped Linux build.
          if [[ "${{ matrix.target }}" != *-musl ]]; then
            build_variant "embeddings" "-embeddings" ""
          fi
        shell: bash

      - name: Inspect macOS build diagnostics
        if: startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple')
        run: |
          set -euo pipefail
          echo "--- SDK ---"
          xcrun --sdk macosx --show-sdk-path
          echo "--- Relevant compiler lines ---"
          for LOG in build-${{ matrix.target }}-*.log; do
            [ -f "$LOG" ] || continue
            echo "--- $LOG ---"
            grep -E 'running: .*clang|running: .*cc|cargo:warning=' "$LOG" | sed -n '1,120p' || true
          done
        shell: bash

      - name: Upload macOS diagnostics
        if: failure() && (startsWith(matrix.target, 'x86_64-apple') || startsWith(matrix.target, 'aarch64-apple'))
        uses: actions/upload-artifact@v7.0.1
        with:
          name: hyphae-${{ matrix.target }}-diagnostics
          path: |
            build-${{ matrix.target }}-*.log
            smoke-${{ matrix.target }}-*.log

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: hyphae-${{ matrix.target }}
          # The -embeddings archive only exists for non-musl targets; tell the
          # action to ignore the missing path rather than fail the upload.
          if-no-files-found: ignore
          path: |
            hyphae-${{ matrix.target }}.${{ matrix.archive }}
            hyphae-${{ matrix.target }}-embeddings.${{ matrix.archive }}

  packages:
    name: Linux packages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download linux x86_64 build
        uses: actions/download-artifact@v8.0.1
        with:
          name: hyphae-x86_64-unknown-linux-musl
          path: artifacts

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release --no-default-features

      - name: Install packaging tools
        uses: taiki-e/install-action@v2.69.6
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build DEB
        run: cargo deb -p hyphae-cli --no-build --no-default-features

      - name: Build RPM
        run: cargo generate-rpm -p crates/hyphae-cli

      - name: Upload DEB
        uses: actions/upload-artifact@v7.0.1
        with:
          name: hyphae-deb
          path: target/debian/*.deb

      - name: Upload RPM
        uses: actions/upload-artifact@v7.0.1
        with:
          name: hyphae-rpm
          path: target/generate-rpm/*.rpm

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build, packages]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS

      - name: Extract release notes from tag
        id: notes
        run: |
          NOTES=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}")
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          body_path: /tmp/release-notes.md
          files: release/*
