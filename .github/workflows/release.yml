name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64-linux)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Configure cross for musl (aarch64)
        if: matrix.cross && contains(matrix.target, 'musl')
        run: |
          mkdir -p .cargo
          cat > Cross.toml <<'TOML'
          [target.aarch64-unknown-linux-musl.env]
          passthrough = ["CFLAGS"]
          TOML

      - name: Build
        run: |
          # sqlite-vec uses BSD u_int*_t types missing from musl — define them
          if [[ "${{ matrix.target }}" == *-musl ]]; then
            export CFLAGS="-Du_int8_t=uint8_t -Du_int16_t=uint16_t -Du_int64_t=uint64_t"
          fi
          if [ "${{ matrix.cross }}" = "true" ]; then
            CROSS_CONTAINER_OPTS="--env CFLAGS" cross build --release --no-default-features --target ${{ matrix.target }}
          else
            cargo build --release --no-default-features --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../hyphae-${{ matrix.target }}.tar.gz hyphae
        shell: bash

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../hyphae-${{ matrix.target }}.zip hyphae.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyphae-${{ matrix.target }}
          path: hyphae-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS

      - name: Extract release notes from tag
        id: notes
        run: |
          NOTES=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}")
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: release/*
