# Hyphae Configuration
# Place at: ~/.config/hyphae/config.toml
# Or set HYPHAE_CONFIG=/path/to/config.toml

[store]
# SQLite database path (default: platform data dir)
# path = "~/Library/Application Support/dev.hyphae.hyphae/memories.db"

[memory]
default_importance = "medium"

# Decay rate per day (0.95 = loses 5% per day)
decay_rate = 0.95

# Weight threshold for automatic pruning
prune_threshold = 0.1

[consolidation]
# Default topic consolidation threshold
default_threshold = 15

[consolidation.topics]
# "errors/active" = "exempt"
# "errors/resolved" = "exempt"
# "exploration" = 8

[embeddings]
# Embedding model (fastembed model_code). Default: bge-small-en-v1.5 (384d, English, fast)
# Other options:
#   "BAAI/bge-base-en-v1.5"               — 768d, English (more accurate, slower)
#   "BAAI/bge-large-en-v1.5"              — 1024d, English (best accuracy, largest)
#   "Xenova/all-MiniLM-L12-v2"            — 384d, English
#   "jinaai/jina-embeddings-v2-base-code" — 768d, code-optimized
model = "BAAI/bge-small-en-v1.5"

[extraction]
# Layer 0: rule-based fact extraction (zero LLM cost)
enabled = true

# Minimum keyword score to keep a fact
min_score = 3.0

# Maximum facts per extraction pass
max_facts = 10

[recall]
# Layer 2: context injection before sessions
enabled = true

# Maximum memories to inject
limit = 15

[mcp]
# MCP server transport: "stdio"
transport = "stdio"

# Custom instructions appended to MCP server description
# instructions = "Always recall before starting work"
